<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#f4f7ff;
}

.sidebar{
width:250px;
background:#0d6efd;
color:white;
padding:25px 20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin-bottom:18px;
}

.sidebar ul li a{
text-decoration:none;
color:white;
display:block;
padding:10px;
border-radius:8px;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.2);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#0d6efd;
color:white;
padding:15px 25px;
}

.content{
flex:1;
padding:30px;
}

.profile-card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
max-width:800px;
margin:auto;
}

.profile-header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

.profile-pic{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #0d6efd;
cursor:pointer;
}

.profile-name{
font-size:22px;
font-weight:600;
color:black;
}

.profile-list{
margin-top:20px;
}

.profile-item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.profile-item span{
color:#555;
}

.profile-item input{
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
}

.btn{
background:#0d6efd;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
background:#0b5ed7;
}

.otp-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.otp-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

.otp-box input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>USER</h2>
<ul>
<li><a href="../index.html">Dashboard</a></li>
<li><a href="../uploads/index.html">Uploads</a></li>
<li><a href="#">Profile</a></li>
<li><a href="#" id="logoutBtn">Logout</a></li>
</ul>
</div>

<div class="main">

<div class="header">
<h2>PROFILE</h2>
</div>

<div class="content">

<div class="profile-card">

<div class="profile-header">

<img id="profilePic" class="profile-pic" src="/default-profile.jpg">

<div class="profile-name" id="usernameTitle"></div>

<input type="file" id="profileInput" hidden>

</div>

<div class="profile-list" id="profileData"></div>

</div>

</div>

</div>


<div class="otp-popup" id="otpPopup">

<div class="otp-box">

<h3>Verifikasi OTP</h3>

<input type="text" id="otpInput" placeholder="Masukkan kode OTP">

<button class="btn" onclick="verifyOtp()">Verifikasi</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
