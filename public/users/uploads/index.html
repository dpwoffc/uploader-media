<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  display:flex;
  min-height:100vh;
  background:#f4f7ff;
}
.sidebar{
  width:250px;
  background:#0d6efd;
  color:white;
  padding:25px 20px;
  transition:0.3s ease;
}
.sidebar h2{
  margin-bottom:30px;
}
.sidebar ul{
  list-style:none;
}
.sidebar ul li{
  margin-bottom:18px;
}
.sidebar ul li a{
  text-decoration:none;
  color:white;
  display:block;
  padding:10px;
  border-radius:8px;
  transition:0.2s;
}
.sidebar ul li a:hover{
  background:rgba(255,255,255,0.2);
}
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}
.header{
  background:#0d6efd;
  color:white;
  padding:15px 25px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.hamburger{
  font-size:22px;
  cursor:pointer;
  display:none;
}
.content{
  flex:1;
  padding:30px;
  background:white;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}
@media(max-width:768px){
  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:1000;
  }
  .sidebar.active{
    left:0;
  }
  .hamburger{
    display:block;
  }
  .overlay.active{
    display:block;
  }
}
.title-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.upload-box{
  border:2px dashed #0d6efd;
  border-radius:12px;
  padding:40px;
  text-align:center;
  transition:0.3s;
  cursor:pointer;
  position:relative;
}
.upload-box:hover{
  background:#f5f8ff;
}
.upload-icon{
  font-size:50px;
  margin-bottom:10px;
}
.upload-box h3{
  margin-bottom:5px;
}
.upload-box p{
  color:#777;
  margin-bottom:15px;
}
.btn-upload{
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:15px;
}
.btn-upload:hover{
  background:#0b5ed7;
}
.file-info{
  margin-top:15px;
  font-size:14px;
  color:#444;
}
.progress-container{
  width:100%;
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
  display:none;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#0d6efd;
  transition:0.3s;
}
.preview-box{
  margin-top:15px;
}
.preview-box img,
.preview-box video,
.preview-box audio{
  max-width:100%;
  max-height:300px;
  display:block;
  margin:auto;
}
.btn-submit{
  margin-top:15px;
  background:#198754;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}
.btn-submit:hover{
  background:#157347;
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <h2>USER</h2>
  <ul>
    <li><a href="../index.html" class="menu-link">Dashboard</a></li>
    <li><a href="#" class="menu-link">Uploads</a></li>
    <li><a href="#" id="logoutBtn" class="menu-link">Logout</a></li>
  </ul>
</div>

<div class="main">
  <div class="header">
    <div class="hamburger" id="hamburger">☰</div>
    <h2>UPLOADS</h2>
  </div>

  <div class="content">
    <div class="card">
      <div class="upload-box" id="dropArea">
        <h3>Drag & Drop File</h3>
        <p>atau klik untuk memilih file</p>

        <input type="file" id="fileInput" hidden>
        <button type="button" class="btn-upload" id="btnUpload">Pilih File</button>

        <div class="file-info" id="fileInfo"></div>
        <div class="preview-box" id="previewBox"></div>

        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <button class="btn-submit" onclick="uploadFile()">Upload File</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Sambungkan tombol "Pilih File" ke input
  document.getElementById("btnUpload").addEventListener("click", () => {
    document.getElementById("fileInput").click();
  });
</script>
</body>
</html>
