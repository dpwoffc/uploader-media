<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#f4f7ff;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#0d6efd;
color:white;
padding:25px 20px;
transition:0.3s ease;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin-bottom:18px;
}

.sidebar ul li a{
text-decoration:none;
color:white;
display:block;
padding:10px;
border-radius:8px;
transition:0.2s;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#0d6efd;
color:white;
padding:15px 25px;
display:flex;
align-items:center;
gap:15px;
}

.hamburger{
font-size:22px;
cursor:pointer;
display:none;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
background:white;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* TITLE BAR */

.title-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.filter{
padding:8px 12px;
border-radius:8px;
border:1px solid #ddd;
}

/* TABLE */

.product-table{
width:100%;
border-collapse:collapse;
}

.product-table th{
background:#f1f3ff;
text-align:left;
}

.product-table th,
.product-table td{
padding:12px;
border-bottom:1px solid #eee;
}

/* BUTTONS */

.btn-copy{
background:#0d6efd;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-edit{
background:#ffc107;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-delete{
background:#dc3545;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:900;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.hamburger{
display:block;
}

.overlay.active{
display:block;
}

}

</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>USER</h2>

<ul>
<li><a href="#" class="menu-link">Dashboard</a></li>
<li><a href="./uploads/index.html" class="menu-link">Uploads</a></li>
<li><a href="#" id="logoutBtn" class="menu-link">Logout</a></li>
</ul>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="hamburger" id="hamburger">☰</div>
<h2>USER DASHBOARD</h2>
</div>

<div class="content">

<div class="card">

<div class="title-bar">
<h3>File Manager</h3>

<select id="filter" class="filter">
<option value="newest">Terbaru</option>
<option value="oldest">Terlama</option>
<option value="largest">Terbesar</option>
<option value="smallest">Terkecil</option>
</select>

</div>

<table class="product-table">

<thead>
<tr>
<th>Nama File</th>
<th>Size</th>
<th>URL</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="fileTable"></tbody>

</table>

</div>
</div>
</div>

<script src="./script.js"></script>

</body>
</html>
